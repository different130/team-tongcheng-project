    <script>
        // 1. 初始化地图
        const map = L.map('map').setView([31.8, 118.5], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; 开源地图贡献者 | 姚鼐生平足迹地图'
        }).addTo(map);

        // 2. 定义生平事件数据（和你之前的一致）
        const allTimelineEvents = [
            { lnglat: [31.06, 117.29], title: "出生桐城", year: "1731年", desc: "生于安徽桐城麻溪姚氏家族" },
            { lnglat: [31.06, 117.29], title: "江南乡试中举", year: "1750年", desc: "19岁考中江南乡试举人" },
            { lnglat: [39.90, 116.40], title: "考中进士入仕", year: "1763年", desc: "32岁考中进士，入选翰林院庶吉士" },
            { lnglat: [39.90, 116.40], title: "入四库全书馆", year: "1773年", desc: "以非翰林身份入《四库全书》馆任纂修官" },
            { lnglat: [39.90, 116.40], title: "托病请辞解官", year: "1774年", desc: "43岁因学术志趣与馆阁汉学风气不合，以疾乞归" },
            { lnglat: [36.19, 117.11], title: "登泰山后南归", year: "1775年", desc: "专程登泰山，后自京返皖正式南归" },
            { lnglat: [32.06, 118.78], title: "主讲钟山书院", year: "1777年起", desc: "主讲钟山等书院近40年，诲迪后进" },
            { lnglat: [32.06, 118.78], title: "病逝钟山书院", year: "1815年", desc: "享年85岁，病逝于南京钟山书院" }
        ];

        // 3. 渲染地图标记（绑定 eventTitle 用于时间轴跳转）
        allTimelineEvents.forEach(item => {
            const marker = L.marker(item.lnglat).addTo(map);
            marker.bindPopup(`<b>${item.title}</b><br><small>${item.year}</small><br>${item.desc}`);
            marker.eventTitle = item.title; // 给标记绑定标题，用于跳转匹配
        });

        // 4. 渲染时间轴 + 点击跳转功能
        function renderFullTimeline() {
            const timelineEl = document.getElementById('timeline-content');
            timelineEl.innerHTML = "";
            allTimelineEvents.forEach(event => {
                const itemEl = document.createElement('div');
                itemEl.className = 'timeline-item';
                itemEl.innerHTML = `
                    <div class="timeline-title">${event.title}</div>
                    <div><span class="timeline-year">${event.year}</span> ${event.desc}</div>
                `;
                // 点击时间轴：跳转到对应地点+打开弹窗
                itemEl.addEventListener('click', () => {
                    map.setView(event.lnglat, 10); // 地图放大到10级，聚焦地点
                    // 找到对应标记并打开弹窗
                    map.eachLayer(layer => {
                        if (layer instanceof L.Marker && layer.eventTitle) {
                            if (
                                (layer.eventTitle.includes("北京") && event.title.includes("北京")) ||
                                (layer.eventTitle.includes("南京") && event.title.includes("南京")) ||
                                (layer.eventTitle.includes("桐城") && event.title.includes("桐城")) ||
                                (layer.eventTitle.includes("泰山") && event.title.includes("泰山")) ||
                                layer.eventTitle === event.title
                            ) {
                                layer.openPopup();
                            }
                        }
                    });
                });
                timelineEl.appendChild(itemEl);
            });
        }

        // 页面加载完成后初始化地图和时间轴
        window.onload = function() {
            renderFullTimeline();
        };
    </script>
