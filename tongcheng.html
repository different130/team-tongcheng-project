<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桐城派姚门弟子关系图谱</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{display:flex;height:100vh;font-family:Microsoft YaHei}
  #chart{flex:1;background:#fcfcfc}
  #panel{width:360px;background:#fff;border-left:1px solid #ddd;padding:25px}
  #search{width:100%;padding:10px;margin-bottom:15px;border-radius:6px;border:1px solid #ccc;font-size:14px}
  .modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;background:#fff;padding:25px;border-radius:12px;box-shadow:0 0 20px rgba(0,0,0,0.2);z-index:999;display:none}
  .modal h4{margin-bottom:15px;color:#e53e3e;font-size:18px}
  .modal p{line-height:1.8;color:#333}
  .mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:998;display:none}
  .close{position:absolute;top:15px;right:15px;font-size:20px;cursor:pointer;color:#666}
</style>
</head>
<body>
<div id="chart"></div>
<div id="panel">
  <h3>桐城派关系图谱</h3>
  <input id="search" placeholder="搜索人物：姚鼐、梅曾亮、管同、方东树、刘开、陈用光" oninput="searchCenter()">
  <div style="margin-top:20px;line-height:2">
    🔹 <b>三层切换</b>：点击【姚鼐】<br>
    🔹 <b>点任意弟子</b>：直接显示【全部关系】<br>
    🔹 <b>双击人物</b>：查看详情<br>
    🔹 <b>点击连线</b>：查看关系<br>
    🔹 连线永久红色文字：师承/教授/交游/论学
  </div>
</div>

<div class="mask" id="mask"></div>
<div class="modal" id="modal">
  <span class="close" onclick="closeModal()">×</span>
  <h4 id="modalTitle"></h4>
  <p id="modalContent"></p>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
<script>
const chart = echarts.init(document.getElementById('chart'));
let level = 0;
let showAllRelation = false; // 控制：是否显示全部弟子关系

// 固定布局节点
const nodes = [
  {id:0, name:'姚鼐',      x:600, y:220, itemStyle:{color:'#e74c3c'}},
  {id:1, name:'方苞',      x:400, y:220, itemStyle:{color:'#3498db'}},
  {id:2, name:'刘大櫆',    x:800, y:220, itemStyle:{color:'#3498db'}},
  {id:3, name:'梅曾亮',    x:340, y:380, itemStyle:{color:'#2ecc71'}},
  {id:4, name:'管同',      x:480, y:380, itemStyle:{color:'#2ecc71'}},
  {id:5, name:'方东树',    x:620, y:380, itemStyle:{color:'#2ecc71'}},
  {id:6, name:'刘开',      x:760, y:380, itemStyle:{color:'#2ecc71'}},
  {id:7, name:'陈用光',    x:900, y:380, itemStyle:{color:'#2ecc71'}},
  {id:8, name:'李兆洛',    x:240, y:500, itemStyle:{color:'#f39c12'}},
  {id:9, name:'邓廷桢',    x:380, y:500, itemStyle:{color:'#f39c12'}},
  {id:10,name:'吴廷栋',    x:520, y:500, itemStyle:{color:'#f39c12'}},
  {id:11,name:'恽敬',      x:660, y:500, itemStyle:{color:'#f39c12'}},
  {id:12,name:'吴德旋',    x:800, y:500, itemStyle:{color:'#f39c12'}},
  {id:13,name:'翁方纲',    x:950, y:500, itemStyle:{color:'#f39c12'}},
];

// 连线数据（全部关系）
const links = [
  {source:1, target:0, name:'师承'},
  {source:2, target:0, name:'师承'},
  {source:0, target:3, name:'教授'},
  {source:0, target:4, name:'教授'},
  {source:0, target:5, name:'教授'},
  {source:0, target:6, name:'教授'},
  {source:0, target:7, name:'教授'},
  {source:3, target:8, name:'交游'},
  {source:3, target:9, name:'交游'},
  {source:4, target:10,name:'交游'},
  {source:5, target:11,name:'论学'},
  {source:6, target:12,name:'交游'},
  {source:7, target:13,name:'问学'},
];

// 人物+关系介绍
const personInfo = {
  0:"姚鼐：清代桐城派集大成者，倡导义理、考据、辞章合一，培养大批姚门弟子。",
  1:"方苞：桐城派创始人，提出义法说，为桐城派散文理论奠定基础。",
  2:"刘大櫆：桐城派中坚人物，继承方苞，传道于姚鼐。",
  3:"梅曾亮：姚门四杰之首，桐城派后期核心领袖。",
  4:"管同：姚门四杰之一，以古文见长，文风犀利。",
  5:"方东树：姚门四杰之一，经学家、古文家，擅长论学。",
  6:"刘开：姚门四杰之一，少年成才，姚鼐得意弟子。",
  7:"陈用光：姚鼐入室弟子，官至礼部侍郎。",
  8:"李兆洛：清代学者，与梅曾亮交游密切。",
  9:"邓廷桢：清代名臣，与梅曾亮诗文相交。",
  10:"吴廷栋：理学家，与管同交游论道。",
  11:"恽敬：阳湖派领袖，与方东树相互论学。",
  12:"吴德旋：清代文人，与刘开诗文交游。",
  13:"翁方纲：金石学家，陈用光向其问学求教。"
};
const linkInfo = [
  "方苞 → 姚鼐：桐城派师承脉络",
  "刘大櫆 → 姚鼐：传道授业",
  "姚鼐教授梅曾亮：姚门核心弟子",
  "姚鼐教授管同：姚门四杰",
  "姚鼐教授方东树：姚门四杰",
  "姚鼐教授刘开：姚门四杰",
  "姚鼐教授陈用光：入室弟子",
  "梅曾亮 ↔ 李兆洛：古文交游",
  "梅曾亮 ↔ 邓廷桢：文坛交游",
  "管同 ↔ 吴廷栋：理学交游",
  "方东树 ↔ 恽敬：学术论学",
  "刘开 ↔ 吴德旋：诗文交游",
  "陈用光 ↔ 翁方纲：虚心问学"
];

// 弹窗
function showModal(title, content) {
  document.getElementById('modalTitle').innerText = title;
  document.getElementById('modalContent').innerText = content;
  document.getElementById('modal').style.display = 'block';
  document.getElementById('mask').style.display = 'block';
}
function closeModal() {
  document.getElementById('modal').style.display = 'none';
  document.getElementById('mask').style.display = 'none';
}

// ======================
// 核心：点任意弟子 → 直接显示【全部弟子关系】
// ======================
function renderThreeLayer() {
  let data = [], linkData = [];

  // 第一层：仅姚鼐
  if (level === 0) {
    data = [nodes[0]];
    linkData = [];
  }

  // 第二层：桐城三祖
  if (level === 1) {
    data = [nodes[0], nodes[1], nodes[2]];
    linkData = [links[0], links[1]];
  }

  // 第三层：姚门弟子
  if (level === 2) {
    data = [
      nodes[0],nodes[1],nodes[2],
      nodes[3],nodes[4],nodes[5],nodes[6],nodes[7]
    ];
    linkData = [
      links[0],links[1],
      links[2],links[3],links[4],links[5],links[6]
    ];

    // 🔥 关键改动：只要开启，就显示【所有弟子的全部关系】
    if (showAllRelation) {
      data.push(nodes[8], nodes[9], nodes[10], nodes[11], nodes[12], nodes[13]);
      linkData.push(links[7], links[8], links[9], links[10], links[11], links[12]);
    }
  }

  chart.setOption({
    title: {text:['桐城派文脉','桐城三祖','姚门弟子'][level], left:'center'},
    series: [{
      type: 'graph', layout: 'none', roam: true, zoom: true,
      symbolSize: 48, label: { show: true },
      // 🔥 永久红色连线文字：师承/教授/交游/论学
      edgeLabel: { 
        show: true, 
        formatter:p=>p.data.name, 
        fontSize:14, 
        color:'#FF0000', 
        fontWeight:'bold' 
      },
      edgeSymbol: ['none', 'arrow'],
      data: data,
      links: linkData
    }]
  }, true);
}

// 搜索功能（布局整洁不混乱）
function searchCenter() {
  const key = document.getElementById('search').value.trim();
  if (!key) { showAllRelation = false; renderThreeLayer(); return; }
  
  const target = nodes.find(item => item.name.includes(key));
  if (!target) return;

  const relatedLinks = links.filter(l => l.source === target.id || l.target === target.id);
  const relatedIds = new Set();
  relatedLinks.forEach(l => { relatedIds.add(l.source); relatedIds.add(l.target); });
  const relatedNodes = nodes.filter(n => relatedIds.has(n.id));

  const cx = 600, cy = 300, radius = 200;
  const count = relatedNodes.length - 1;
  let index = 0;
  const layoutNodes = relatedNodes.map(n => {
    if (n.id === target.id) return {...n, x: cx, y: cy};
    const angle = (2 * Math.PI * index++) / count;
    return {...n, x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle)};
  });

  chart.setOption({
    title: {text:`${target.name} · 关系网`},
    series: [{
      type: 'graph', layout: 'none', roam: true, zoom: true,
      symbolSize: 55, label: {show:true},
      edgeLabel: { show: true, formatter:p=>p.data.name, fontSize:14, color:'#FF0000', fontWeight:'bold' },
      edgeSymbol: ['none', 'arrow'], data: layoutNodes, links: relatedLinks
    }]
  }, true);
}

// ======================
// 点击逻辑：点任意弟子 → 全开所有关系
// ======================
chart.on('click', (params) => {
  if (params.dataType === 'edge') {
    const idx = links.findIndex(l => l.source === params.data.source && l.target === params.data.target);
    showModal(`关系：${params.data.name}`, linkInfo[idx]);
    return;
  }

  if (params.dataType !== 'node') return;
  const id = params.data.id;
  const searchText = document.getElementById('search').value.trim();
  if (searchText !== '') return;

  // 点击姚鼐切换层级
  if (id === 0) {
    level = (level + 1) % 3;
    showAllRelation = false; // 重置
    renderThreeLayer();
    return;
  }

  // 🔥 点任意弟子 → 直接显示【全部关系】
  if (level === 2 && [3,4,5,6,7].includes(id)) {
    showAllRelation = !showAllRelation;
    renderThreeLayer();
  }
});

// 双击节点 → 人物介绍
chart.on('dblclick', (params) => {
  if (params.dataType === 'node') {
    showModal(params.data.name, personInfo[params.data.id]);
  }
});

// 初始化
renderThreeLayer();
window.addEventListener('resize', () => chart.resize());
</script>
</body>
</html>
