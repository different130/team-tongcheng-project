        姚鼐的辞官与治学，是清代学术转向的关键节点：他离开官场纷争，以书院为阵地，将桐城派古文理论系统化，为中国古文留下了“文以载道”的精神脉络。<br><br>
        其《古文辞类纂》确立了古文选本的典范，“义理、考据、辞章”三合一的主张，深刻影响了近代文学思潮，也为当代人文研究提供了重要的思想资源。
